<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section id="calculadora">
        <input id="display" type="text" readonly placeholder="0" />
        <div id="botones" class="botones">
            <div class="columna numeros">
                <button class="btn" data-value="1">1</button>
                <button class="btn" data-value="2">2</button>
                <button class="btn" data-value="3">3</button>
                <button class="btn" data-value="4">4</button>
                <button class="btn" data-value="5">5</button>
                <button class="btn" data-value="6">6</button>
                <button class="btn" data-value="7">7</button>
                <button class="btn" data-value="8">8</button>
                <button class="btn" data-value="9">9</button>
                <button class="btn" data-value="0">0</button>
                <button class="btn" data-value=".">.</button>
                <button id="btn-clear" class="btn btn-clear">C</button>
            </div>
            <div class="columna operaciones">
                <button class="btn btn-op" data-value="/">÷</button>
                <button class="btn btn-op" data-value="x">x</button>
                <button class="btn btn-op" data-value="-">-</button>
                <button class="btn btn-op" data-value="+">+</button>
            </div>
        </div>
        <button id="btn-equals" class="btn btn-equals">=</button>
    </section>
    
    <script src="calculadora.js"></script>
</body>
</html>
